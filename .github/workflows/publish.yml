name: Publish to PyPI

# Publikasi otomatis saat kamu membuat GitHub Release.
# Memakai PyPI Trusted Publishing (OIDC) — TIDAK perlu API token/secret.
#
# Setup sekali di PyPI:
#   pypi.org -> project owasp-audit-agent -> Settings -> Publishing ->
#   "Add a new pending publisher":
#     Owner        : <username/org GitHub kamu>
#     Repository   : <nama repo, mis. owasp-audit-agent>
#     Workflow     : publish.yml
#     Environment  : pypi
# Setelah itu, tiap GitHub Release akan mem-build & mengunggah otomatis.

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # wajib untuk Trusted Publishing (OIDC)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
